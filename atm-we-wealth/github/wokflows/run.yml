name: Run WeWealth

on:
  workflow_dispatch:

jobs:
  run-wewealth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script (solo logica server)
        run: node atm-we-wealth.js
